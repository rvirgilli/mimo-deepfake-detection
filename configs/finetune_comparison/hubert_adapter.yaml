# HuBERT-Large with adapter fine-tuning - standalone config
# Bottleneck adapters after transformer layers (~1M trainable params)
# Same adapter config and hyperparameters as MiMo/wav2vec2 for fair comparison

seed: 42
track: LA
output_dir: ./experiments/paper_final/hubert_adapter
model_save_dir: ./experiments/paper_final/hubert_adapter/models
log_dir: ./experiments/paper_final/hubert_adapter/logs
eval_output_dir: ./experiments/paper_final/hubert_adapter/scores
experiment_name: hubert_adapter

frontend:
  name: hubert
  sample_rate: 16000
  cut: 64600  # ~4 seconds at 16kHz
  model_name: facebook/hubert-large-ll60k
  freeze: false
  finetune:
    strategy: adapter
    adapter:
      dim: 64
      dropout: 0.1
      layers: last_n
      n_layers: 8

dataset:
  name: asvspoof
  database_path: ${oc.env:ASVSPOOF_LA_DATABASE}
  protocols_path: ${oc.env:ASVSPOOF_PROTOCOLS,./SSL_Anti-spoofing/database/}
  batch_size: 14
  num_workers: 8
  eval_batch_size: 64

training:
  lr: 3.387990231321127e-05
  weight_decay: 0.00012930039719879935
  num_epochs: 20
  encoder_lr: null
  layerwise_lr:
    enabled: false
  patience: 5
  scheduler:
    enabled: true
    type: plateau
    factor: 0.5
    plateau_patience: 2
  loss: weighted_CCE
  loss_weights:
    - 0.33461891265935323
    - 0.6653810873406467
  cudnn_deterministic: true
  cudnn_benchmark: false

rawboost:
  algo: 6
  auto_scale: false
  N_f: 5
  nBands: 5
  minF: 20
  maxF: 11900
  minBW: 100
  maxBW: 1000
  minCoeff: 10
  maxCoeff: 100
  minG: 0
  maxG: 0
  minBiasLinNonLin: 5
  maxBiasLinNonLin: 20
  P: 10
  g_sd: 2
  SNRmin: 10
  SNRmax: 40

model:
  gat_dims:
    - 128
    - 48
  pool_ratios:
    - 0.7676008929764409
    - 0.7676008929764409
    - 0.7676008929764409
    - 0.7676008929764409
  temperatures:
    - 2.0
    - 2.0
    - 100.0
    - 100.0
  dropout: 0.5380811810032032
  dropout_way: 0.2770961155616896
  dropout_input: 0.2
  filts_0: 192
  encoder_scale: 1.5
  projection:
    type: linear
    hidden_dims:
      - 512
      - 256
    activation: gelu
    dropout: 0.1
    use_batchnorm: true
